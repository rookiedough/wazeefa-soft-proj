<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wazeefa — Recruitment Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="candidate-actions.css">
</head>
<body>
      <!-- Login (shown before authentication) -->
  <section id="view-login" class="view view--active" aria-label="Login">
    <div class="login-layout">
      <aside class="login-brand">
        <div class="login-brand__content">
          <img src="assets/logo.png" alt="Wazeefa logo" class="logo-image logo-image--lg">
          <h1 class="login-brand__title">WAZEEFA</h1>
          <p class="login-brand__tagline">Leading AI resume screening platform in Qatar</p>
        </div>
      </aside>

      <div class="login-form-panel">
        <header class="login-form-panel__header">
          <h2>Wazeefa Login</h2>
          <p>Welcome back!</p>
        </header>

        <form id="login-form" class="login-form" novalidate>
          <div class="form-field">
            <label for="employee-id">Employee ID</label>
            <input
              type="text"
              id="employee-id"
              name="employeeId"
              placeholder="Enter your employee ID"
              autocomplete="username"
              required
            >
            <span class="form-error" id="employee-id-error" role="alert"></span>
          </div>

          <div class="form-field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              minlength="6"
            >
            <span class="form-error" id="password-error" role="alert"></span>
          </div>

          <button type="submit" class="btn btn--primary btn--full">Login</button>
          <a href="#" class="login-form__forgot">Forgot password?</a>
        </form>
      </div>
    </div>
  </section>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script src="script.js"></script>
  <script src="candidate-actions.js"></script>
</body>
</html>
